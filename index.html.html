<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text → Image Generator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--p:#6366f1;--pl:#8b5cf6;--bg:#f7f7fa;--c:#fff;--b:#e2e4ea;--t:#1a1a2e;--s:#6b7280;--m:#9ca3af}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}

/* ━━━ HERO ━━━ */
.hero{background:#0f0a2a;position:relative;overflow:hidden;padding:0 0 48px}
.hero::before{content:'';position:absolute;top:-120px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(99,102,241,.25),transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-100px;left:-60px;width:400px;height:400px;background:radial-gradient(circle,rgba(139,92,246,.18),transparent 70%);pointer-events:none}
.hero-nav{max-width:920px;margin:0 auto;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2}
.hero-logo{display:flex;align-items:center;gap:10px}
.hero-logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--p),var(--pl));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:15px;box-shadow:0 2px 12px rgba(99,102,241,.4)}
.hero-logo-text{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.02em}
.hero-badge{padding:5px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;font-size:11px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.02em}
.hero-content{max-width:920px;margin:0 auto;padding:36px 28px 0;position:relative;z-index:2;text-align:center}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.25);border-radius:24px;font-size:12px;color:#a5b4fc;font-weight:600;margin-bottom:20px}
.hero-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero-title{font-size:42px;font-weight:900;letter-spacing:-.04em;line-height:1.2;margin-bottom:14px}
.hero-title .gt{background:linear-gradient(135deg,#c4b5fd,#818cf8,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-title .wt{color:#fff}
.hero-sub{font-size:15px;color:rgba(255,255,255,.5);max-width:520px;margin:0 auto 28px;line-height:1.7;font-weight:400}
.hero-features{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:36px}
.hero-feat{display:flex;align-items:center;gap:5px;padding:7px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;font-size:12px;color:rgba(255,255,255,.55);font-weight:500;transition:all .2s}
.hero-feat:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.hero-feat .fi{font-size:14px}
/* 입력 카드 */
.input-card{max-width:700px;margin:0 auto;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;position:relative;z-index:2;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.input-card .sl2{font-size:13px;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.input-card .ta2{width:100%;min-height:140px;padding:16px 18px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.12);border-radius:14px;font-size:14px;line-height:1.8;color:#e2e8f0;resize:vertical;outline:none;font-family:inherit;transition:border-color .2s}
.input-card .ta2:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.2)}
.input-card .ta2::placeholder{color:rgba(255,255,255,.22)}
.input-card .cc2{text-align:right;font-size:11px;color:rgba(255,255,255,.25);margin-top:5px}
.input-card .br2{display:flex;gap:10px;margin-top:16px;align-items:center;justify-content:space-between}
.btn-gen{padding:13px 36px;background:linear-gradient(135deg,var(--p),var(--pl));border:none;border-radius:13px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(99,102,241,.35);letter-spacing:-.01em}
.btn-gen:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 28px rgba(99,102,241,.45)}
.btn-gen:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.input-hint{font-size:11px;color:rgba(255,255,255,.3);display:flex;align-items:center;gap:4px}
/* 그리드 장식 */
.hero-grid{position:absolute;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
/* 플로팅 요소 */
.float-el{position:absolute;border-radius:50%;pointer-events:none;opacity:.08}
.f1{width:180px;height:180px;background:var(--p);top:15%;right:12%;animation:float1 8s ease-in-out infinite}
.f2{width:100px;height:100px;background:#ec4899;bottom:20%;left:8%;animation:float2 10s ease-in-out infinite}
.f3{width:60px;height:60px;background:#22d3ee;top:35%;left:18%;animation:float1 12s ease-in-out infinite reverse}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes float2{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-15px) scale(1.1)}}

/* ━━━ MAIN ━━━ */
.mn{max-width:880px;margin:0 auto;padding:24px 24px 60px}
.sc{background:var(--c);border:1px solid var(--b);border-radius:14px;padding:22px 24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.sl{font-size:13px;font-weight:700;color:#374151;margin-bottom:10px;display:block}
.bp{padding:10px 24px;background:linear-gradient(135deg,var(--p),var(--pl));border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(99,102,241,.2)}
.bp:hover:not(:disabled){transform:translateY(-1px)}.bp:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.bg2{padding:10px 20px;background:var(--c);border:1.5px solid var(--b);border-radius:10px;color:#374151;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.bg2:hover{border-color:var(--p);color:var(--p)}
.ba2{padding:10px 20px;background:linear-gradient(135deg,#059669,#10b981);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.bd{padding:10px 22px;background:#1e1b4b;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}.bd:hover{background:#312e81}
.lw{display:flex;align-items:center;justify-content:center;gap:10px;padding:32px 16px;color:var(--s);font-size:13px}
.sp{width:18px;height:18px;border:2.5px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.eb{padding:12px 16px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;color:#dc2626;font-size:13px;margin-bottom:14px}
.cf{border-radius:14px;overflow:hidden;border:1px solid var(--b);background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.05)}
.cf canvas{display:block;width:100%;height:auto}
.mr{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.mt{padding:3px 11px;background:#f3f4f6;border-radius:16px;font-size:12px;color:#4b5563;font-weight:500;border:1px solid var(--b);white-space:nowrap}
.mt-a{color:#fff;border-color:transparent}
.sec{margin-top:16px;padding-top:14px;border-top:1px solid var(--b)}
.sec-label{font-size:12px;font-weight:700;color:var(--s);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec-label span{font-weight:400;color:var(--m)}
.lg{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.lb{padding:8px 4px;background:#f9fafb;border:2px solid var(--b);border-radius:10px;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
.lb:hover{border-color:#a5b4fc;background:#eef2ff}
.lb.active{border-color:var(--p);background:#eef2ff;box-shadow:0 0 0 2px rgba(99,102,241,.15)}
.lb .ln{font-size:18px;line-height:1}.lb .lnm{font-size:9px;color:var(--s);margin-top:3px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cg{display:flex;gap:6px;flex-wrap:wrap}
.cb{width:44px;height:44px;border-radius:12px;border:2.5px solid var(--b);cursor:pointer;transition:all .15s;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cb:hover{transform:scale(1.08);border-color:#a5b4fc}
.cb.active{border-color:var(--p);box-shadow:0 0 0 2px rgba(99,102,241,.2);transform:scale(1.08)}
.cb .sw{width:100%;height:100%;position:absolute;top:0;left:0;border-radius:9px}
.cb .cl{font-size:8px;font-weight:800;color:#fff;position:relative;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.4);text-align:center;line-height:1.1}
.cb.auto-b{background:#f9fafb}.cb.auto-b .cl{color:var(--s);text-shadow:none;font-size:9px}
.ig{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
.ib{width:100px;height:70px;border-radius:10px;border:2.5px solid var(--b);cursor:pointer;overflow:hidden;flex-shrink:0;position:relative;transition:all .15s;background:#f1f5f9}
.ib:hover{border-color:#a5b4fc;transform:scale(1.04)}
.ib.active{border-color:var(--p);box-shadow:0 0 0 2px rgba(99,102,241,.2)}
.ib img{width:100%;height:100%;object-fit:cover;display:block}
.ib .il{position:absolute;bottom:0;left:0;right:0;padding:2px 6px;background:rgba(0,0,0,.55);color:#fff;font-size:8px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ib .ild{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--m)}
.ib-none{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px}
.ib-none .ln{font-size:16px}.ib-none .cl{font-size:9px;color:var(--s);font-weight:600}
.ib-upload{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;background:#f0fdf4;border-color:#86efac;border-style:dashed}
.ib-upload:hover{background:#dcfce7;border-color:#4ade80}
.ib-upload .ln{font-size:18px}.ib-upload .cl{font-size:8.5px;color:#16a34a;font-weight:700}
.ib-user{border-color:#4ade80}.ib-user .il{background:rgba(22,163,74,.7)}
.ar{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--b)}
.ef{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--b)}.ef.open{display:block}
.er{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.el{width:60px;flex-shrink:0;font-size:12px;font-weight:700;color:var(--s);text-align:right}
.ei{flex:1;padding:8px 12px;background:#fafafe;border:1.5px solid var(--b);border-radius:9px;font-size:13px;color:var(--t);outline:none;font-family:inherit}.ei:focus{border-color:var(--p)}
.es{flex:1;padding:8px 12px;background:#fafafe;border:1.5px solid var(--b);border-radius:9px;font-size:13px;color:var(--t);cursor:pointer;outline:none;font-family:inherit}
.ea{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.dr{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;align-items:center;padding-top:14px;border-top:1px solid var(--b)}
.ss{padding:9px 12px;background:#fff;border:1.5px solid var(--b);border-radius:9px;color:#374151;font-size:13px;cursor:pointer;outline:none;font-family:inherit}
.pt{padding:10px 16px;background:#f3f4f6;border:1.5px solid var(--b);border-radius:10px;font-size:13px;color:var(--s);cursor:pointer;font-weight:600;font-family:inherit}
.pt.active{background:var(--p);color:#fff;border-color:var(--p)}
.rs{animation:fadeUp .4s ease}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 22px;background:#1e1b4b;color:#fff;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.18);opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);z-index:100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}
@media(max-width:640px){.hero-title{font-size:28px}.hero-sub{font-size:13px}.hero-features{gap:5px}.hero-feat{font-size:10px;padding:5px 10px}.input-card{padding:20px;margin:0 12px}.mn{padding:14px 14px 40px}.sc{padding:16px}.er{flex-direction:column;align-items:stretch}.el{width:auto;text-align:left}.lg{grid-template-columns:repeat(4,1fr)}.hero-nav{padding:14px 16px}.hero-content{padding:24px 16px 0}.f1,.f2,.f3{display:none}}
</style>
</head>

THEMES.forEach(function(th,i){var b=document.createElement("div");b.className="cb"+(i===0?" active":"")+(i===0?" auto-b":"");if(i===0)b.innerHTML='<span class="cl">AUTO</span>';else b.innerHTML='<div class="sw" style="background:linear-gradient(135deg,'+th.c[0]+','+th.c[1]+')"></div><span class="cl">'+th.n+'</span>';b.onclick=function(){themeIdx=i;if(cur){drawAll($cv,cur,$sz.value,curImg);meta(cur);toast("🎨 "+(i===0?"자동":th.n));}document.querySelectorAll(".cb").forEach(function(x){x.classList.remove("active");});b.classList.add("active");};$cg.appendChild(b);});

$i.addEventListener("input",function(){$cc.textContent=$i.value.length.toLocaleString()+" / 3,000자";$bg.disabled=!$i.value.trim();});
function toast(m){$to.textContent=m;$to.classList.add("show");setTimeout(function(){$to.classList.remove("show");},2200);}
function err(m){$eb.textContent="⚠️ "+m;$eb.classList.remove("hidden");}
function herr(){$eb.classList.add("hidden");}
function meta(d){var p2=getpal(d);var h='<span class="mt mt-a" style="background:'+p2.a+'">'+(CI[d.category]||"📝")+" "+(CL[d.category]||"블로그")+"</span>";(d.keywords||[]).forEach(function(k){h+='<span class="mt">#'+k+"</span>";});if(d.mood)h+='<span class="mt">🎭 '+d.mood+"</span>";if(d.readTime)h+='<span class="mt">📖 '+d.readTime+"</span>";$mr.innerHTML=h;}
function fill(d){$et.value=d.title||"";$es.value=d.subtitle||"";$ec.value=d.category||"default";$ek.value=(d.keywords||[]).join(", ");}

// ★ 이미지 그리드 렌더
var userImages=[]; // {img:Image, label:string}
var $fu=document.getElementById("fileUp");

function buildImgGrid(queries,images){
  $ig.innerHTML="";
  // 1) "이미지 없음" 버튼
  var nb=document.createElement("div");nb.className="ib ib-none"+(imgIdx===-1?" active":"");
  nb.innerHTML='<div class="ln">🚫</div><div class="cl">이미지 없이</div>';
  nb.onclick=function(){imgIdx=-1;curImg=null;drawAll($cv,cur,$sz.value,null);document.querySelectorAll(".ib").forEach(function(x){x.classList.remove("active");});nb.classList.add("active");toast("🚫 이미지 없이 생성");};
  $ig.appendChild(nb);

  // 2) ★ 업로드 버튼
  var ub=document.createElement("div");ub.className="ib ib-upload";
  ub.innerHTML='<div class="ln">📁</div><div class="cl">내 이미지</div>';
  ub.onclick=function(){$fu.click();};
  $ig.appendChild(ub);

  // 3) 사용자 업로드 이미지들
  userImages.forEach(function(ui,idx){
    var b=document.createElement("div");b.className="ib ib-user";
    var im2=document.createElement("img");im2.src=ui.img.src;b.appendChild(im2);
    var lbl=document.createElement("div");lbl.className="il";lbl.textContent=ui.label;b.appendChild(lbl);
    b.onclick=function(){
      imgIdx="user-"+idx;curImg=ui.img;
      drawAll($cv,cur,$sz.value,curImg);
      document.querySelectorAll(".ib").forEach(function(x){x.classList.remove("active");});
      b.classList.add("active");
      toast("📁 "+ui.label);
    };
    if(imgIdx==="user-"+idx)b.classList.add("active");
    $ig.appendChild(b);
  });

  // 4) AI 검색 이미지들
  queries.forEach(function(q,i){
    var b=document.createElement("div");b.className="ib"+(imgIdx===i?" active":"");
    if(images[i]){
      var img=document.createElement("img");img.src=images[i].src;b.appendChild(img);
      var lbl=document.createElement("div");lbl.className="il";lbl.textContent=q.label||q.query;b.appendChild(lbl);
    }else{
      b.innerHTML='<div class="ild">로딩 실패</div>';
    }
    b.onclick=function(){
      if(!images[i])return;
      imgIdx=i;curImg=images[i];
      drawAll($cv,cur,$sz.value,curImg);
      document.querySelectorAll(".ib").forEach(function(x){x.classList.remove("active");});
      b.classList.add("active");
      toast("🖼 "+(q.label||q.query));
    };
    $ig.appendChild(b);
  });
}

// ★ 파일 업로드 핸들러
$fu.addEventListener("change",function(e){
  var files=e.target.files;
  if(!files||!files.length)return;
  var processed=0,total=files.length;
  for(var i=0;i<files.length;i++){
    (function(file){
      var reader=new FileReader();
      reader.onload=function(ev){
        var img=new Image();
        img.onload=function(){
          var name=file.name.replace(/\.[^.]+$/,"");
          if(name.length>10)name=name.slice(0,10)+"…";
          userImages.push({img:img,label:"📁 "+name});
          processed++;
          if(processed===total&&cur){
            // 마지막으로 업로드된 이미지를 자동 선택
            imgIdx="user-"+(userImages.length-1);
            curImg=img;
            drawAll($cv,cur,$sz.value,curImg);
            buildImgGrid(cur.imageQueries,imgList);
            toast("📁 "+total+"장 업로드 완료!");
          }
        };
        img.src=ev.target.result;
      };
      reader.readAsDataURL(file);
    })(files[i]);
  }
  $fu.value="";
});

async function render(d){
  cur=d;
  $lt.textContent="연관 이미지 "+d.imageQueries.length+"장 검색 중...";
  imgList=await ldAll(d.imageQueries);
  // 첫 번째 유효 이미지 선택
  imgIdx=-1;curImg=null;
  for(var i=0;i<imgList.length;i++){if(imgList[i]){imgIdx=i;curImg=imgList[i];break;}}
  drawAll($cv,d,$sz.value,curImg);
  meta(d);fill(d);
  buildImgGrid(d.imageQueries,imgList);
  document.querySelectorAll(".lb").forEach(function(b,i){b.classList.toggle("active",i===layoutIdx);});
  document.querySelectorAll(".cb").forEach(function(b,i){b.classList.toggle("active",i===themeIdx);});
  $rs.classList.remove("hidden");
  setTimeout(function(){$rs.scrollIntoView({behavior:"smooth",block:"start"});},100);
}

$bg.addEventListener("click",async function(){if(!$i.value.trim())return;$bg.disabled=true;$bg.textContent="🔍 분석 중...";$lt.textContent="텍스트 분석 중...";$lw.classList.remove("hidden");herr();$rs.classList.add("hidden");cur=null;curImg=null;imgList=[];imgIdx=-1;layoutIdx=Math.floor(Math.random()*LF.length);try{await render(await analyze($i.value));toast("✅ 이미지 생성 완료");}catch(e){err("오류: "+e.message);}finally{$lw.classList.add("hidden");$bg.disabled=!$i.value.trim();$bg.textContent="🎨 이미지 생성";}});
$re.addEventListener("click",async function(){if(!$i.value.trim())return;$re.disabled=true;$re.textContent="🔍 재분석...";$lt.textContent="새 관점으로 재분석...";$lw.classList.remove("hidden");herr();layoutIdx=Math.floor(Math.random()*LF.length);try{await render(await analyze($i.value));toast("🤖 재생성 완료!");$ef.classList.remove("open");$ed.classList.remove("active");}catch(e){err("오류: "+e.message);}finally{$lw.classList.add("hidden");$re.disabled=false;$re.textContent="🤖 AI 재분석";}});
$ed.addEventListener("click",function(){$ef.classList.toggle("open");$ed.classList.toggle("active");});
$ap.addEventListener("click",function(){if(!cur)return;var kw=$ek.value.trim();var ks=kw?kw.split(/[,，、\s]+/).map(function(s){return s.replace(/^#/,"").trim();}).filter(Boolean):[];cur.title=$et.value.trim()||cur.title;cur.subtitle=$es.value.trim();cur.category=$ec.value;cur.keywords=ks;drawAll($cv,cur,$sz.value,curImg);meta(cur);toast("✅ 수정 적용");});
$sz.addEventListener("change",function(){if(cur)drawAll($cv,cur,$sz.value,curImg);});
$dl.addEventListener("click",function(){if(!cur)return;try{var o=document.createElement("canvas");drawAll(o,cur,$sz.value,curImg);o.toBlob(function(b){if(!b){err("Blob 실패");return;}var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="cover-"+$sz.value+"-"+Date.now()+".png";a.style.display="none";document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u);},300);},"image/png");}catch(e){err("다운로드 실패: "+e.message);}});
</script>
